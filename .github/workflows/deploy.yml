name: Fetch YouTube Videos and Trigger Cloudflare

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually from the GitHub UI

permissions:
  contents: write # Essential to allow the runner to push changes back to your repo

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Video Fetcher Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        # This bash script cleans whitespaces/newlines out before launching Python
        run: |
          CLEAN_KEY=$(echo "$YOUTUBE_API_KEY" | tr -d '\r\n[:space:]')
          CLEAN_ID=$(echo "$YOUTUBE_CHANNEL_ID" | tr -d '\r\n[:space:]')
          YOUTUBE_API_KEY=$CLEAN_KEY YOUTUBE_CHANNEL_ID=$CLEAN_ID python generate_posts.py

      # This step saves the new files. Cloudflare detects this push instantly.
      - name: Commit and Push Generated Content
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/
          git commit -m "Automated update: Synced latest YouTube feeds" || echo "No new updates found"
          git push
